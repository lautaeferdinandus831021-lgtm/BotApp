<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BOT PRO</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<div class="topbar">
  <input id="k" placeholder="API KEY">
  <input id="s" placeholder="SECRET">
  <input id="p" placeholder="PASSPHRASE">
  <button onclick="save()">SAVE</button>
</div>

<div class="grid">
  <div class="card">
    <div id="chart"></div>
  </div>

  <div class="card side">
    <div id="balance"></div>
    <div id="price"></div>
    <div id="pnl"></div>
    <div id="position"></div>
    <div id="signal"></div>

    <button onclick="buy()">BUY</button>
    <button onclick="sell()">SELL</button>

    <h3>DEPTH</h3>
    <canvas id="depth"></canvas>

    <h3>FOOTPRINT (DELTA)</h3>
    <canvas id="foot"></canvas>

    <h3>REPLAY</h3>
    <button onclick="replay()">PLAY</button>
  </div>
</div>

<script src="auth.js"></script>
<script src="trade.js"></script>
<script src="ws.js"></script>
<script src="chart.js"></script>
<script src="depth.js"></script>
<script src="footprint.js"></script>

</body>
</html>
