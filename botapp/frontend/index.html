<!DOCTYPE html>
<html>
<head>
<title>BOT DASHBOARD</title>
<style>
body { background:black; color:#00ff00; font-family:monospace }
input,button { margin:5px }
#chart { width:100%; height:400px; background:#111 }
</style>
</head>

<body>

<h2>CONFIG</h2>
<input id="key" placeholder="API KEY"><br>
<input id="secret" placeholder="API SECRET"><br>
<input id="pass" placeholder="PASSPHRASE"><br>
<button onclick="save()">SAVE</button>

<h2>DASHBOARD</h2>

<div id="price">PRICE: -</div>
<div id="pnl">PNL: -</div>
<div id="balance">BALANCE: -</div>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ws = new WebSocket("wss://" + location.host.replace("3000","8765"));

ws.onmessage = (e)=>{
  const d = JSON.parse(e.data);

  document.getElementById("price").innerText = "PRICE: " + d.price;
  document.getElementById("pnl").innerText = "PNL: " + d.pnl;

  if(d.balance){
    document.getElementById("balance").innerText =
      "BALANCE: " + JSON.stringify(d.balance);
  }
};

function save(){
  fetch("/config",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      api_key:document.getElementById("key").value,
      api_secret:document.getElementById("secret").value,
      passphrase:document.getElementById("pass").value
    })
  });
}
</script>

</body>
</html>
